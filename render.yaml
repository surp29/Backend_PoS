services:
  # Backend API Service
  - type: web
    name: pos-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python setup_render_db.py
    startCommand: python main.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://pos.vercel.app
      - key: FLASK_ENV
        value: production
      - key: BACKEND_PORT
        value: 10000
    healthCheckPath: /docs
